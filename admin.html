<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الدكان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #eef2ff; padding: 1rem; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .header { background: #0f172a; color: white; padding: 1rem; border-radius: 30px; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn { background: #f59e0b; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .form-card { background: white; border-radius: 28px; padding: 1.8rem; margin-bottom: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1rem; }
        label { font-weight: bold; display: block; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 0.7rem; border: 1px solid #cbd5e1; border-radius: 20px; }
        .spec-row, .extra-row { display: flex; gap: 0.7rem; margin-bottom: 0.7rem; align-items: center; flex-wrap: wrap; }
        .products-table { background: white; border-radius: 28px; overflow-x: auto; padding: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: right; padding: 0.8rem; border-bottom: 1px solid #e2e8f0; }
        .edit-btn { background: #3b82f6; color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; margin: 0 3px; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
        .small-img { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; }
        .help-text { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
        @media (max-width: 700px) { th, td { font-size: 0.8rem; padding: 0.4rem; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<script>
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "dokkan2025";
    (function checkAuth() {
        if (!sessionStorage.getItem('adminAuth')) {
            let user = prompt("🔐 اسم المستخدم:");
            let pass = prompt("🔑 كلمة المرور:");
            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
            } else {
                alert("❌ بيانات غير صحيحة!");
                window.location.href = "index.html";
            }
        }
    })();
    function logout() { sessionStorage.removeItem('adminAuth'); location.reload(); }
</script>

<div class="admin-container">
    <div class="header">
        <h2>⚙️ لوحة تحكم الدكان</h2>
        <div><button onclick="logout()" class="logout-btn">🚪 تسجيل الخروج</button> <a href="index.html" style="color:white;">← عرض المتجر</a></div>
    </div>

    <div class="form-card">
        <h3 id="formTitle">➕ إضافة منتج جديد</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>اسم المنتج *</label><input type="text" id="prodName" placeholder="مثال: سماعات بلوتوث"></div>
        <div class="form-group"><label>السعر (جنيه) *</label><input type="number" id="prodPrice" placeholder="السعر"></div>
        <div class="form-group"><label>وصف مختصر</label><input type="text" id="shortDesc" placeholder="وصف صغير للمنتج"></div>
        <div class="form-group"><label>🖼️ رابط الصورة الرئيسية *</label><input type="text" id="mainImage" placeholder="https://i.ibb.co/xxxxx/image.jpg"><div class="help-text">⭐ ارفع الصورة على ImgBB وانسخ الرابط المباشر</div></div>
        <div class="form-group"><label>🖼️ روابط صور إضافية (مفصولة بفاصلة)</label><input type="text" id="extraImages" placeholder="رابط1, رابط2, رابط3"></div>
        <div class="form-group"><label>🏷️ المواصفات</label><div id="specsContainer"><div class="spec-row"><input placeholder="المفتاح" class="specKey" style="flex:1;"><input placeholder="القيمة" class="specValue" style="flex:1;"><button type="button" onclick="addSpecRow()" style="background:#4ade80;">+</button></div></div></div>
        <div class="form-group"><label>✨ خانات إضافية</label><div id="extraContainer"><div class="extra-row"><input placeholder="اسم الحقل" class="extraName" style="flex:1;"><input placeholder="قيمة الحقل" class="extraVal" style="flex:1;"><button type="button" onclick="addExtraRow()" style="background:#a78bfa;">+</button></div></div></div>
        <button class="btn" onclick="saveProduct()">💾 حفظ المنتج</button>
        <button class="btn-secondary" onclick="resetForm()">🔄 إلغاء</button>
    </div>

    <div class="products-table">
        <h3>📋 المنتجات الحالية</h3>
        <table id="productsTable"><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>المواصفات</th><th>إجراءات</th></tr></thead><tbody id="tableBody"></tbody></table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const productsRef = database.ref('products');
    let allProducts = {};

    function saveProduct() {
        let id = document.getElementById('editId').value;
        const name = document.getElementById('prodName').value.trim();
        const price = document.getElementById('prodPrice').value.trim();
        const shortDesc = document.getElementById('shortDesc').value.trim();
        const mainImage = document.getElementById('mainImage').value.trim();
        const extraImagesRaw = document.getElementById('extraImages').value.trim();
        let imagesArray = extraImagesRaw ? extraImagesRaw.split(',').map(s=>s.trim()) : [];
        if(mainImage && !imagesArray.includes(mainImage)) imagesArray.unshift(mainImage);
        const specs = collectSpecs();
        const extraFields = collectExtraFields();
        if(!name || !price || !mainImage) { alert('يرجى ملء الاسم والسعر والصورة'); return; }
        const productData = { id: id || Date.now().toString(), name, price, shortDesc, mainImage, images: imagesArray, specs, extraFields };
        if(id) { productsRef.child(id).update(productData).then(()=>{ alert('✅ تم التعديل'); resetForm(); }); }
        else { productsRef.child(productData.id).set(productData).then(()=>{ alert('✅ تمت الإضافة'); resetForm(); }); }
    }

    function renderProductTable() {
        const tbody = document.getElementById('tableBody');
        const productsArray = Object.values(allProducts);
        if(!productsArray.length) { tbody.innerHTML = '<tr><td colspan="5">لا توجد منتجات</td></tr>'; return; }
        tbody.innerHTML = productsArray.map(prod => `<tr><td><img class="small-img" src="${prod.mainImage}"></td><td>${prod.name}</td><td>${prod.price} ج.م</td><td>${Object.entries(prod.specs||{}).map(([k,v])=>`${k}:${v}`).join(', ').substring(0,40)}</td><td><button class="edit-btn" onclick="editProduct('${prod.id}')">تعديل</button><button class="delete-btn" onclick="deleteProduct('${prod.id}')">حذف</button></td></tr>`).join('');
    }

    productsRef.on('value', (snapshot) => { allProducts = snapshot.val()||{}; renderProductTable(); });
    function collectSpecs() { let s={}; document.querySelectorAll('#specsContainer .spec-row').forEach(r=>{ let k=r.querySelector('.specKey')?.value.trim(), v=r.querySelector('.specValue')?.value.trim(); if(k&&v) s[k]=v; }); return s; }
    function collectExtraFields() { let e=[]; document.querySelectorAll('#extraContainer .extra-row').forEach(r=>{ let n=r.querySelector('.extraName')?.value.trim(), v=r.querySelector('.extraVal')?.value.trim(); if(n&&v) e.push({fieldName:n,fieldValue:v}); }); return e; }
    function resetForm() { document.getElementById('editId').value=''; document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('shortDesc').value=''; document.getElementById('mainImage').value=''; document.getElementById('extraImages').value=''; document.getElementById('specsContainer').innerHTML='<div class="spec-row"><input placeholder="المفتاح" class="specKey" style="flex:1;"><input placeholder="القيمة" class="specValue" style="flex:1;"><button type="button" onclick="addSpecRow()">+</button></div>'; document.getElementById('extraContainer').innerHTML='<div class="extra-row"><input placeholder="اسم الحقل" class="extraName" style="flex:1;"><input placeholder="قيمة الحقل" class="extraVal" style="flex:1;"><button type="button" onclick="addExtraRow()">+</button></div>'; document.getElementById('formTitle').innerText='➕ إضافة منتج جديد'; }
    function editProduct(id) { productsRef.child(id).once('value', (snap)=>{ let p=snap.val(); if(p){ document.getElementById('editId').value=id; document.getElementById('prodName').value=p.name; document.getElementById('prodPrice').value=p.price; document.getElementById('shortDesc').value=p.shortDesc||''; document.getElementById('mainImage').value=p.mainImage; document.getElementById('extraImages').value=(p.images||[]).filter(i=>i!==p.mainImage).join(','); document.getElementById('specsContainer').innerHTML='<div class="spec-row"><input placeholder="المفتاح" class="specKey"><input placeholder="القيمة" class="specValue"><button onclick="addSpecRow()">+</button></div>'; for(const[k,v]of Object.entries(p.specs||{})) addSpecRow(k,v); document.getElementById('extraContainer').innerHTML='<div class="extra-row"><input placeholder="اسم الحقل" class="extraName"><input placeholder="قيمة الحقل" class="extraVal"><button onclick="addExtraRow()">+</button></div>'; if(p.extraFields) p.extraFields.forEach(ef=>addExtraRow(ef.fieldName,ef.fieldValue)); document.getElementById('formTitle').innerText='✏️ تعديل المنتج'; } }); }
    function deleteProduct(id) { if(confirm('حذف؟')) productsRef.child(id).remove().then(()=>alert('تم الحذف')); }
    window.addSpecRow = function(k='',v='') { let div=document.createElement('div'); div.className='spec-row'; div.innerHTML=`<input placeholder="المفتاح" class="specKey" value="${k}"><input placeholder="القيمة" class="specValue" value="${v}"><button onclick="this.parentElement.remove()">❌</button>`; document.getElementById('specsContainer').appendChild(div); };
    window.addExtraRow = function(n='',v='') { let div=document.createElement('div'); div.className='extra-row'; div.innerHTML=`<input placeholder="اسم الحقل" class="extraName" value="${n}"><input placeholder="قيمة الحقل" class="extraVal" value="${v}"><button onclick="this.parentElement.remove()">❌</button>`; document.getElementById('extraContainer').appendChild(div); };
    document.addEventListener('DOMContentLoaded', () => { renderProductTable(); });
</script>
</body>
</html>
