<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الدكان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #eef2ff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #0f172a; color: white; padding: 15px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { background: #f59e0b; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; color: #0f172a; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .form-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #0f172a; }
        input, select { width: 100%; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 12px; }
        .products-table { background: white; border-radius: 24px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: right; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .edit-btn { background: #3b82f6; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; margin: 2px; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .small-img { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #0f172a; border-right: 4px solid #f59e0b; padding-right: 12px; }
        .success-msg { background: #dcfce7; color: #166534; padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; display: none; }
        hr { margin: 20px 0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "dokkan2025";
    if (!sessionStorage.getItem('adminAuth')) {
        let u = prompt("اسم المستخدم:");
        let p = prompt("كلمة المرور:");
        if (u === ADMIN_USER && p === ADMIN_PASS) sessionStorage.setItem('adminAuth', 'true');
        else { alert("خطأ"); window.location.href = "index.html"; }
    }
    function logout() { sessionStorage.clear(); location.reload(); }
</script>

<div class="container">
    <div class="header">
        <h2>⚙️ لوحة التحكم</h2>
        <div><button onclick="logout()" class="logout-btn">🚪 خروج</button> <a href="index.html" style="color:white;">← المتجر</a></div>
    </div>

    <div id="successMsg" class="success-msg"></div>

    <!-- قسم إضافة المنتج -->
    <div class="form-card">
        <h3 class="section-title" id="formTitle">➕ إضافة منتج جديد</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>اسم المنتج *</label><input type="text" id="prodName" placeholder="مثال: سماعة بلوتوث"></div>
        <div class="form-group"><label>السعر (جنيه) *</label><input type="number" id="prodPrice" placeholder="السعر"></div>
        <div class="form-group"><label>وصف مختصر</label><input type="text" id="shortDesc" placeholder="وصف سريع"></div>
        <div class="form-group"><label>🔗 رابط الصورة الرئيسية *</label><input type="text" id="mainImage" placeholder="https://i.ibb.co/xxxxx.jpg"></div>
        <div class="form-group"><label>🔗 روابط صور إضافية (فاصلة)</label><input type="text" id="extraImages" placeholder="رابط1, رابط2"></div>
        <div><button class="btn" id="saveBtn">💾 حفظ المنتج</button> <button class="btn-secondary" id="resetBtn">🔄 إلغاء</button></div>
    </div>

    <!-- جدول المنتجات -->
    <div class="products-table">
        <h3 class="section-title">📋 المنتجات</h3>
        <table id="productsTable"><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>المواصفات</th><th>إجراءات</th></tr></thead><tbody id="tableBody"><tr><td colspan="5">جاري التحميل...</td></tr></tbody></table>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const productsRef = db.ref('products');

    let allProducts = {};

    function showMessage(msg) {
        let msgDiv = document.getElementById('successMsg');
        msgDiv.textContent = msg;
        msgDiv.style.display = 'block';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
    }

    function renderTable() {
        let tbody = document.getElementById('tableBody');
        let keys = Object.keys(allProducts);
        if(keys.length === 0) { tbody.innerHTML = '<tr><td colspan="5">لا توجد منتجات</td></tr>'; return; }
        let html = '';
        keys.forEach(key => {
            let p = allProducts[key];
            html += `<tr>
                        <td><img class="small-img" src="${p.mainImage || ''}" onerror="this.src='https://placehold.co/50x50'"></td>
                        <td>${p.name}</td>
                        <td>${p.price} ج.م</td>
                        <td>${p.shortDesc || ''}</td>
                        <td><button class="edit-btn" onclick="editProduct('${key}')">تعديل</button> <button class="delete-btn" onclick="deleteProduct('${key}')">حذف</button></td>
                    </tr>`;
        });
        tbody.innerHTML = html;
    }

    // ربط زر الحفظ (الطريقة المضمونة)
    document.getElementById('saveBtn').onclick = function() {
        let id = document.getElementById('editId').value;
        let name = document.getElementById('prodName').value.trim();
        let price = document.getElementById('prodPrice').value.trim();
        let shortDesc = document.getElementById('shortDesc').value.trim();
        let mainImage = document.getElementById('mainImage').value.trim();
        let extraRaw = document.getElementById('extraImages').value.trim();
        let images = extraRaw ? extraRaw.split(',').map(s=>s.trim()) : [];
        if(mainImage && !images.includes(mainImage)) images.unshift(mainImage);
        if(!name || !price || !mainImage) { alert("املأ الاسم والسعر والصورة"); return; }
        
        let productData = { name, price, shortDesc, mainImage, images };
        if(id) {
            productsRef.child(id).update(productData).then(() => { showMessage("تم التعديل"); resetForm(); });
        } else {
            productsRef.push(productData).then(() => { showMessage("تمت الإضافة"); resetForm(); });
        }
    };

    window.editProduct = (id) => {
        let p = allProducts[id];
        document.getElementById('editId').value = id;
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodPrice').value = p.price;
        document.getElementById('shortDesc').value = p.shortDesc || '';
        document.getElementById('mainImage').value = p.mainImage;
        document.getElementById('extraImages').value = (p.images || []).filter(i => i !== p.mainImage).join(',');
        document.getElementById('formTitle').innerText = '✏️ تعديل المنتج';
    };

    window.deleteProduct = (id) => { if(confirm("حذف؟")) productsRef.child(id).remove().then(() => showMessage("تم الحذف")); };
    
    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('shortDesc').value = '';
        document.getElementById('mainImage').value = '';
        document.getElementById('extraImages').value = '';
        document.getElementById('formTitle').innerText = '➕ إضافة منتج جديد';
    }
    document.getElementById('resetBtn').onclick = resetForm;

    productsRef.on('value', (snap) => { allProducts = snap.val() || {}; renderTable(); });
</script>
</body>
</html>
