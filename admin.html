<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الدكان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f4f8; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #1e293b; color: white; padding: 15px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .header h2 { font-size: 1.4rem; }
        .btn-logout { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .btn-save { background: #f59e0b; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; color: #1e293b; }
        .btn-secondary { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .form-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #1e293b; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 12px; }
        table { width: 100%; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        .edit-btn { background: #3b82f6; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; margin-right: 5px; }
        .small-img { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; background: #f1f5f9; }
        .msg { background: #dcfce7; color: #166534; padding: 10px; border-radius: 12px; margin-bottom: 15px; display: none; }
        @media (max-width: 700px) { th, td { font-size: 12px; padding: 8px; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<script>
    // حماية لوحة التحكم بكلمة مرور
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "dokkan2025";
    if (!sessionStorage.getItem('adminAuth')) {
        let u = prompt("اسم المستخدم:");
        let p = prompt("كلمة المرور:");
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            sessionStorage.setItem('adminAuth', 'true');
        } else {
            alert("❌ اسم المستخدم أو كلمة المرور غير صحيحة!");
            window.location.href = "index.html";
        }
    }
    function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
</script>

<div class="container">
    <div class="header">
        <h2>⚙️ لوحة تحكم الدكان</h2>
        <div>
            <button onclick="logout()" class="btn-logout">🚪 تسجيل الخروج</button>
            <a href="index.html" style="color:white; margin-right:10px;">← عرض المتجر</a>
        </div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="form-card">
        <h3 id="formTitle">➕ إضافة منتج جديد</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>اسم المنتج *</label><input type="text" id="name" placeholder="مثال: سماعة بلوتوث"></div>
        <div class="form-group"><label>السعر (جنيه) *</label><input type="number" id="price" placeholder="السعر"></div>
        <div class="form-group"><label>وصف مختصر</label><input type="text" id="shortDesc" placeholder="وصف سريع للمنتج"></div>
        <div class="form-group"><label>🔗 رابط الصورة الرئيسية *</label><input type="text" id="mainImage" placeholder="https://i.ibb.co/xxxxx.jpg"></div>
        <div class="form-group"><label>🔗 روابط صور إضافية (فاصلة)</label><input type="text" id="extraImages" placeholder="رابط1, رابط2, رابط3"></div>
        <div>
            <button class="btn-save" id="saveBtn">💾 حفظ المنتج</button>
            <button class="btn-secondary" id="resetBtn">🔄 إلغاء</button>
        </div>
    </div>

    <div class="form-card">
        <h3>📋 قائمة المنتجات</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الوصف</th><th>إجراءات</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="5">✨ جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const productsRef = db.ref('products');

    let allProducts = {};

    function showMessage(text, isError = false) {
        let m = document.getElementById('msg');
        m.innerText = text;
        m.style.backgroundColor = isError ? '#fee2e2' : '#dcfce7';
        m.style.color = isError ? '#991b1b' : '#166534';
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3000);
    }

    function renderTable() {
        let tbody = document.getElementById('tableBody');
        let keys = Object.keys(allProducts);
        if (keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">📭 لا توجد منتجات. أضف منتجك الأول</td></tr>';
            return;
        }
        let html = '';
        keys.forEach(key => {
            let p = allProducts[key];
            html += `<tr>
                        <td><img class="small-img" src="${p.mainImage || ''}" onerror="this.src='https://placehold.co/50x50?text=No'"></td>
                        <td>${escapeHtml(p.name)}</td>
                        <td>${p.price} ج.م</td>
                        <td>${escapeHtml(p.shortDesc || '').substring(0, 40)}</td>
                        <td>
                            <button class="edit-btn" onclick="editProduct('${key}')">✏️ تعديل</button>
                            <button class="delete-btn" onclick="deleteProduct('${key}')">🗑️ حذف</button>
                        </td>
                    </tr>`;
        });
        tbody.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.editProduct = function(id) {
        let p = allProducts[id];
        if (!p) return;
        document.getElementById('editId').value = id;
        document.getElementById('name').value = p.name;
        document.getElementById('price').value = p.price;
        document.getElementById('shortDesc').value = p.shortDesc || '';
        document.getElementById('mainImage').value = p.mainImage || '';
        let extra = (p.images || []).filter(i => i !== p.mainImage).join(',');
        document.getElementById('extraImages').value = extra;
        document.getElementById('formTitle').innerHTML = '✏️ تعديل المنتج';
    };

    window.deleteProduct = function(id) {
        if (confirm("⚠️ هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
            productsRef.child(id).remove().then(() => showMessage("✅ تم حذف المنتج"));
        }
    };

    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('shortDesc').value = '';
        document.getElementById('mainImage').value = '';
        document.getElementById('extraImages').value = '';
        document.getElementById('formTitle').innerHTML = '➕ إضافة منتج جديد';
    }

    document.getElementById('saveBtn').onclick = function() {
        let id = document.getElementById('editId').value;
        let name = document.getElementById('name').value.trim();
        let price = document.getElementById('price').value.trim();
        let shortDesc = document.getElementById('shortDesc').value.trim();
        let mainImage = document.getElementById('mainImage').value.trim();
        let extraRaw = document.getElementById('extraImages').value.trim();
        let images = extraRaw ? extraRaw.split(',').map(s => s.trim()) : [];
        if (mainImage && !images.includes(mainImage)) images.unshift(mainImage);
        if (!name || !price || !mainImage) {
            showMessage("❌ يرجى ملء الاسم والسعر والصورة الرئيسية", true);
            return;
        }
        let productData = { name, price, shortDesc, mainImage, images };
        if (id) {
            productsRef.child(id).update(productData).then(() => {
                showMessage("✅ تم تعديل المنتج");
                resetForm();
            }).catch(err => showMessage("❌ خطأ: " + err.message, true));
        } else {
            productsRef.push(productData).then(() => {
                showMessage("✅ تمت إضافة المنتج");
                resetForm();
            }).catch(err => showMessage("❌ خطأ: " + err.message, true));
        }
    };
    document.getElementById('resetBtn').onclick = resetForm;

    productsRef.on('value', (snap) => {
        allProducts = snap.val() || {};
        renderTable();
    });
</script>
</body>
</html>
