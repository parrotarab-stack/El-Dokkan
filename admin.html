<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - أضف منتج</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #f59e0b; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>➕ إضافة منتج</h2>
    <input type="text" id="name" placeholder="اسم المنتج">
    <input type="number" id="price" placeholder="السعر">
    <input type="text" id="image" placeholder="رابط الصورة (مثال: https://i.ibb.co/xxxxx.jpg)">
    <button onclick="addProduct()">حفظ المنتج</button>
    <div id="msg" style="margin-top: 10px; color: green;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
            authDomain: "el-dokkan-abc4e.firebaseapp.com",
            databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
            projectId: "el-dokkan-abc4e",
            storageBucket: "el-dokkan-abc4e.firebasestorage.app",
            messagingSenderId: "720051498127",
            appId: "1:720051498127:web:eb3d90666c76fb718494fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.addProduct = function() {
            let name = document.getElementById('name').value;
            let price = document.getElementById('price').value;
            let image = document.getElementById('image').value;
            if(!name || !price || !image) { alert("املأ جميع الحقول"); return; }
            let newProduct = { name: name, price: price, mainImage: image };
            db.ref('products').push(newProduct).then(() => {
                document.getElementById('msg').innerText = "✅ تمت إضافة المنتج";
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('image').value = '';
                setTimeout(() => document.getElementById('msg').innerText = '', 3000);
            }).catch(err => alert("خطأ: " + err.message));
        };
    </script>
</body>
</html>
