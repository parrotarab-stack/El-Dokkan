<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - الدكان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Cairo', sans-serif; }
        .navbar { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .container { max-width: 1000px; margin: 30px auto; background: white; border-radius: 24px; padding: 25px; }
        .main-img { width: 100%; max-height: 400px; object-fit: contain; background: #f8fafc; padding: 20px; border-radius: 16px; }
        .thumb-list { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .thumb-list img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid #e2e8f0; }
        .price { font-size: 28px; font-weight: 800; color: #f59e0b; margin: 15px 0; }
        .specs { background: #f1f5f9; padding: 20px; border-radius: 16px; margin: 20px 0; }
        .spec-item { display: flex; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .spec-key { width: 120px; font-weight: bold; }
        .whatsapp-btn { background: #25D366; color: white; border: none; width: 100%; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; }
        .back-link { color: #f59e0b; text-decoration: none; }
        @media (max-width: 700px) { .container { margin: 15px; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="navbar">
    <div class="logo">🛍️ الدكان</div>
    <a href="index.html" class="back-link">← العودة</a>
</div>
<div class="container" id="productContainer">جاري التحميل...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const url = new URLSearchParams(window.location.search);
    const id = url.get('id');

    if(id) {
        db.ref('products/' + id).once('value', (snap) => {
            let p = snap.val();
            if(!p) { document.getElementById('productContainer').innerHTML = 'منتج غير موجود'; return; }
            let imagesHtml = `<img class="main-img" id="mainImg" src="${p.mainImage}"><div class="thumb-list">`;
            if(p.images) p.images.forEach(img => imagesHtml += `<img src="${img}" onclick="document.getElementById('mainImg').src='${img}'">`);
            imagesHtml += `</div>`;
            let specsHtml = '<div class="specs">';
            if(p.specs) for(let [k,v] of Object.entries(p.specs)) specsHtml += `<div class="spec-item"><div class="spec-key">${k}:</div><div>${v}</div></div>`;
            specsHtml += '</div>';
            document.getElementById('productContainer').innerHTML = `
                ${imagesHtml}
                <h1>${p.name}</h1>
                <div class="price">${p.price} ج.م</div>
                <div>${p.shortDesc || ''}</div>
                ${specsHtml}
                <button class="whatsapp-btn" onclick="window.open('https://wa.me/201000621448?text=${encodeURIComponent('مرحباً، أرغب في شراء: ' + p.name)}', '_blank')">📲 شراء عبر واتساب</button>
            `;
        });
    }
</script>
</body>
</html>
