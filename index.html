<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>الدكان</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; background: #f5f7fb; padding: 20px; }
        .product { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #ddd; }
        img { max-width: 100%; height: 150px; object-fit: contain; }
        button { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-top: 10px; }
        .container { max-width: 800px; margin: auto; }
        .admin-link { display: inline-block; margin-top: 20px; background: #0f172a; color: white; padding: 10px 20px; text-decoration: none; border-radius: 50px; }
        h1 { color: #0f172a; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛍️ الدكان</h1>
    <div id="products"></div>
    <a href="admin.html" class="admin-link">📦 لوحة التحكم</a>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    db.ref('products').on('value', (snap) => {
        let data = snap.val();
        let html = '';
        if(data) {
            for(let id in data) {
                html += `<div class="product">
                            <img src="${data[id].mainImage}" onerror="this.src='https://via.placeholder.com/150'">
                            <h3>${data[id].name}</h3>
                            <p>💰 ${data[id].price} ج.م</p>
                            <button onclick="window.open('https://wa.me/201000621448?text=${encodeURIComponent('أريد شراء: ' + data[id].name)}', '_blank')">📲 شراء</button>
                         </div>`;
            }
        } else { html = '<p>لا توجد منتجات</p>'; }
        document.getElementById('products').innerHTML = html;
    });
</script>
</body>
</html>
