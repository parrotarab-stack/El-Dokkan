<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدكان | El Dokkan - متجرك الإلكتروني</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; }
        /* كل الستايلات بتاعتك زي ماهي (حافظت عليها) */
        .header { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 1.8rem; }
        .admin-link a { background: #f59e0b; color: #1e293b; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: bold; }
        .controls { padding: 1.5rem 2rem; background: white; margin: 1rem 2rem; border-radius: 30px; display: flex; gap: 1rem; justify-content: center; }
        .controls input { flex: 2; padding: 0.8rem 1.2rem; border: 1px solid #e2e8f0; border-radius: 50px; }
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; padding: 1rem 2rem; max-width: 1400px; margin: 0 auto; }
        .product-card { background: white; border-radius: 24px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #eef2ff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); border-color: #f59e0b; }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 1rem; }
        .product-title { font-weight: bold; }
        .product-price { color: #f59e0b; font-size: 1.3rem; font-weight: bold; margin: 0.5rem 0; }
        .product-short-desc { font-size: 0.8rem; color: #475569; }
        .badge { background: #e2e8f0; display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; margin-top: 0.5rem; }
        .empty-state { text-align: center; padding: 4rem; color: #64748b; grid-column: 1 / -1; }
        footer { text-align: center; padding: 2rem; background: #0f172a; color: #94a3b8; margin-top: 2rem; }
        @media (max-width: 640px) { .products-container { padding: 1rem; gap: 1rem; } .controls { margin: 1rem; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
    <div class="logo">
        <h1>الدكان 🛍️</h1>
        <p>El Dokkan | Online Store</p>
    </div>
    <div class="admin-link">
        <a href="admin.html">📦 لوحة التحكم</a>
    </div>
</div>

<div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
</div>

<div class="products-container" id="productsContainer">
    <div class="empty-state">✨ جاري تحميل المنتجات...</div>
</div>

<footer>الدكان - جميع الحقوق محفوظة © 2025 | تواصل: 01000621448</footer>

<script>
    // 🔥 بيانات Firebase بتاعتك
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const productsRef = database.ref('products');

    function renderProducts(products) {
        const container = document.getElementById('productsContainer');
        if (!products || products.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 لا توجد منتجات حالياً - أضف منتجك الأول من لوحة التحكم</div>';
            return;
        }
        container.innerHTML = products.map(product => `
            <div class="product-card" onclick="viewProduct('${product.id}')">
                <img class="product-img" src="${product.mainImage || 'https://picsum.photos/300/200'}" alt="${product.name}">
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.price} ج.م</div>
                    <div class="product-short-desc">${product.shortDesc || ''}</div>
                    <div class="badge">🛒 اضغط للمزيد</div>
                </div>
            </div>
        `).join('');
    }

    window.viewProduct = function(id) {
        window.location.href = `product.html?id=${id}`;
    };

    // 🔥 تحميل المنتجات فوراً
    productsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // تحويل الكائن إلى مصفوفة مع الاحتفاظ بالمعرف (id)
            const productsList = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            }));
            renderProducts(productsList);
        } else {
            renderProducts([]);
        }
    });

    // فلتر البحث
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        productsRef.once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let productsList = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                if (term) {
                    productsList = productsList.filter(p => p.name.toLowerCase().includes(term) || (p.shortDesc && p.shortDesc.toLowerCase().includes(term)));
                }
                renderProducts(productsList);
            }
        });
    });
</script>
</body>
</html>
