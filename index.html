<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدكان | El Dokan</title>
<style>
body{font-family:Tahoma;background:#f5f5f5;margin:0}
header{background:#111;color:#fff;padding:15px;text-align:center;font-size:24px}
.container{padding:15px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px}
.card{background:#fff;border-radius:10px;padding:10px;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px}
.price{color:red;font-weight:bold}

/* Product Page */
#productPage{display:none}
.gallery img{width:100%;max-height:250px;object-fit:cover;margin-bottom:10px}
.btn{background:green;color:#fff;padding:12px;text-align:center;border-radius:8px;display:block;text-decoration:none;margin-top:10px}

/* Admin */
#admin{display:none}
input,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:10px;background:black;color:#fff;border:none;margin-top:10px}
</style>
</head>
<body>
<header>الدكان | El Dokan</header>

<div class="container" id="home">
<div class="products" id="productList"></div>
</div>

<div class="container" id="productPage">
<h2 id="pName"></h2>
<div class="gallery" id="pImages"></div>
<p id="pDesc"></p>
<p class="price" id="pPrice"></p>
<a id="whatsappBtn" class="btn" target="_blank">اطلب عبر واتساب</a>
</div>

<div class="container" id="admin">
<h2>لوحة التحكم</h2>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<textarea id="desc" placeholder="الوصف"></textarea>
<input id="img" placeholder="رابط صورة">
<button onclick="addProduct()">إضافة منتج</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');

function save(){localStorage.setItem('products',JSON.stringify(products));render();}

function render(){
let list=document.getElementById('productList');
list.innerHTML='';
products.forEach((p,i)=>{
list.innerHTML+=`<div class='card' onclick='openProduct(${i})'>
<img src='${p.img}'>
<h4>${p.name}</h4>
<p class='price'>${p.price} جنيه</p>
</div>`;
});
}

function openProduct(i){
let p=products[i];
document.getElementById('home').style.display='none';
document.getElementById('productPage').style.display='block';

document.getElementById('pName').innerText=p.name;
document.getElementById('pImages').innerHTML=`<img src='${p.img}'>`;
document.getElementById('pDesc').innerText=p.desc;
document.getElementById('pPrice').innerText=p.price+' جنيه';

let msg=encodeURIComponent('عاوز المنتج: '+p.name);
document.getElementById('whatsappBtn').href=`https://wa.me/201000621448?text=${msg}`;
}

function addProduct(){
let p={
name:name.value,
price:price.value,
desc:desc.value,
img:img.value
};
products.push(p);
save();
alert('تم الإضافة');
}

render();

// secret admin access
if(location.hash=='#admin'){
document.getElementById('home').style.display='none';
document.getElementById('admin').style.display='block';
}
</script>

</body>
</html>
