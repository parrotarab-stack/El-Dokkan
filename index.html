<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>المتجر - الدكان</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f7fb; }
        .product { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        img { max-width: 100%; height: 150px; object-fit: contain; }
        button { background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 30px; cursor: pointer; margin-top: 10px; }
        .container { max-width: 800px; margin: auto; }
        a { display: inline-block; margin-top: 20px; color: #f59e0b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ الدكان</h1>
        <div id="products"></div>
        <a href="admin.html">📦 لوحة التحكم</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
            authDomain: "el-dokkan-abc4e.firebaseapp.com",
            databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
            projectId: "el-dokkan-abc4e",
            storageBucket: "el-dokkan-abc4e.firebasestorage.app",
            messagingSenderId: "720051498127",
            appId: "1:720051498127:web:eb3d90666c76fb718494fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('products').on('value', (snapshot) => {
            let products = snapshot.val();
            let html = '';
            for(let id in products) {
                let p = products[id];
                html += `
                    <div class="product">
                        <img src="${p.mainImage}" onerror="this.src='https://placehold.co/150'">
                        <h3>${p.name}</h3>
                        <p>💰 ${p.price} ج.م</p>
                        <button onclick="window.open('https://wa.me/201000621448?text=${encodeURIComponent('أريد شراء: ' + p.name)}', '_blank')">📲 شراء عبر واتساب</button>
                    </div>
                `;
            }
            document.getElementById('products').innerHTML = html || "<p>لا توجد منتجات</p>";
        });
    </script>
</body>
</html>
