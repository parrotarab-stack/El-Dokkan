<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدكان - المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Cairo', sans-serif; }
        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: 800; }
        .admin-btn { background: #f59e0b; padding: 8px 20px; border-radius: 40px; color: #0f172a; text-decoration: none; font-weight: bold; }
        .search-box { padding: 15px 20px; background: white; margin: 15px; border-radius: 50px; }
        .search-box input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 50px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { width: 100%; height: 180px; object-fit: contain; background: #f8fafc; padding: 15px; }
        .product-info { padding: 12px; }
        .product-price { color: #f59e0b; font-size: 18px; font-weight: 800; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25D366; color: white; padding: 10px 18px; border-radius: 50px; text-decoration: none; }
        footer { text-align: center; padding: 25px; background: #0f172a; color: #94a3b8; margin-top: 30px; }
        .empty-state { text-align: center; padding: 60px; color: #64748b; grid-column: 1 / -1; }
        @media (max-width: 640px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
    <div class="logo">🛍️ الدكان</div>
    <a href="admin.html" class="admin-btn">📦 لوحة التحكم</a>
</div>
<div class="search-box"><input type="text" id="search" placeholder="🔍 ابحث عن منتج..."></div>
<div class="products-grid" id="productsContainer">✨ جاري التحميل...</div>
<footer><p>الدكان | الدفع عند الاستلام | واتساب: 01000621448</p></footer>
<a href="https://wa.me/201000621448" class="whatsapp-float">📱 واتساب</a>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRBIFK0awniSJgPNGsYdWP3Sf4TzHiMIo",
        authDomain: "el-dokkan-abc4e.firebaseapp.com",
        databaseURL: "https://el-dokkan-abc4e-default-rtdb.firebaseio.com",
        projectId: "el-dokkan-abc4e",
        storageBucket: "el-dokkan-abc4e.firebasestorage.app",
        messagingSenderId: "720051498127",
        appId: "1:720051498127:web:eb3d90666c76fb718494fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProducts = [];

    function render(products) {
        let container = document.getElementById('productsContainer');
        if(!products.length) { container.innerHTML = '<div class="empty-state">📭 لا توجد منتجات</div>'; return; }
        container.innerHTML = products.map(p => `
            <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
                <img class="product-img" src="${p.mainImage}" loading="lazy">
                <div class="product-info">
                    <div>${p.name}</div>
                    <div class="product-price">${p.price} ج.م</div>
                </div>
            </div>
        `).join('');
    }

    db.ref('products').on('value', (snap) => {
        let data = snap.val() || {};
        allProducts = Object.keys(data).map(key => ({ id: key, ...data[key] }));
        render(allProducts);
    });

    document.getElementById('search').addEventListener('input', (e) => {
        let term = e.target.value.toLowerCase();
        if(!term) render(allProducts);
        else render(allProducts.filter(p => p.name.toLowerCase().includes(term)));
    });
</script>
</body>
</html>
